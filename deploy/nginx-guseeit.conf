# API 子域名 → Spring Boot 后端
server {
    listen 80;
    listen [::]:80;
    server_name api.agentnow.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.agentnow.fun;

    ssl_certificate     /etc/letsencrypt/live/api.agentnow.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.agentnow.fun/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# Admin 管理后台（静态文件 + API 代理）
server {
    listen 80;
    listen [::]:80;
    server_name admin.agentnow.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.agentnow.fun;

    ssl_certificate     /etc/letsencrypt/live/api.agentnow.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.agentnow.fun/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10m;

    root /opt/guseeit/admin/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8787/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
